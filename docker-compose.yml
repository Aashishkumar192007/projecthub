version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: propertyhub-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: propertyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d propertyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propertyhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: propertyhub-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/propertyhub?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-enterprise-key
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: propertyhub-web
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next

volumes:
  postgres_data:
  redis_data:
